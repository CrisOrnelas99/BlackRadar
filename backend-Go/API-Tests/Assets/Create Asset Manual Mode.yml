info:
  name: Create Asset Manual Mode
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:8080/api/assets
  body:
    type: json
    data: |
      {
        "name": "Manual Laptop Asset",
        "type": "Device",
        "operatingSystem": "Windows 11",
        "owner": "system_admin",
        "criticality": "High"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
