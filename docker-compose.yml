services:
  postgres:
    image: postgres:16
    container_name: blackradar-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./BlackRadar
    container_name: blackradar-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      BOOTSTRAP_DEV_DATA: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    image: node:22-alpine
    container_name: blackradar-frontend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./BlackRadar/ui:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200"
    ports:
      - "4200:4200"

volumes:
  postgres_data:
  frontend_node_modules:
