info:
  name: Send AI Message
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8080/api/ai/message
  auth: inherit
  body:
    type: json
    data: |
      {
        "message": "Say hello in one short sentence."
      }

settings:
  encodeUrl: true
  timeout: 90000
  followRedirects: true
  maxRedirects: 5
