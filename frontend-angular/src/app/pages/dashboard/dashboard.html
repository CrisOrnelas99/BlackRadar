<section class="dashboard-shell">
  <div class="dashboard-card">
    <p class="dashboard-kicker">Authenticated</p>
    <h1>Dashboard</h1>
    <p class="dashboard-copy">
      Signed in as <strong>{{ userEmail || 'unknown user' }}</strong>.
    </p>
    <button type="button" class="dashboard-button" (click)="signOut()">Sign out</button>
  </div>
</section>
